<!-- It's the popup window, and content here will be visible -->

<html>
    <head>
        <link rel="stylesheet" href="assets/reset.css">
        <link rel="stylesheet" href="assets/style.css">
    </head>
    <body>
        <div class="logo">
            <!-- <img src="assets/sheep_logo.png" alt="Sheep Logo"> -->
            <img src="assets/sheep_logo.svg" alt = "Sheep logo">
        </div>

        <h1>Look away for 1 minute when big sheep appears!</h1>
        <div class="time-choices">
            <button class="timebutton" data-time="30">30 min</button>
            <button class="timebutton" data-time="60">60 min</button>
        </div>

        <h1>Next break in:</h1>
        <p id="timer">--</p>
        <div class="controls">
            <button id="startbutton">Start</button>
            <button id="cancelbutton">Cancel</button>
        </div>
        <script src="scripts/popup.js"></script>
    </body>
</html>
