<!-- It's the popup window, and content here will be visible -->

<html>
    <head>
        <link rel="stylesheet" href="styles/reset.css">
        <link rel="stylesheet" href="styles/style.css">
    </head>
    <body>
        <header>
            <img src="assets/sheep_logo.svg" alt = "Sheep logo">
        </header>

        <h1>Rest your eyes for 1 min when big sheep appears!</h1>
        <fieldset>

            <!-- for class presentation, I set the time to be shorter intentionally, but in real life, we would do: -->
            <!-- step 1: we could replace data-time="30" by "1800" (30min * 60sec = 1800) here AND -->
            <!-- step 2: change "30" value in popup.js code line 21 & 24 to be 1800 AND -->
            <!-- step 3: change "60" value here to be replaced by 3600 -->
            <button class="timebutton" data-time="30">30 min</button>
            <button class="timebutton" data-time="60">60 min</button>
        </fieldset>

        <h1>Next break in:</h1>
        <p id="timer">--</p>
        <footer>
            <button id="startbutton">Start</button>
            <button id="cancelbutton">Cancel</button>
        </footer>
        <script src="scripts/popup.js"></script>
    </body>
</html>
