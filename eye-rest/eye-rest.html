<!-- It's the popup window, and content here will be visible -->

<html>
    <head>
        <link rel="stylesheet" href="reset.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Look away for 1 minute when big sheep appears!</h1>
        <div class="time-choices">
            <button class="timebutton" data-time="10">10 min</button>
            <button class="timebutton" data-time="20">20 min</button>
        </div>

        <h1>Next break in:</h1>
        <p id="timer">--</p>
        <div class="controls">
            <button id="startbutton">Start</button>
            <button id="cancelbutton">Cancel</button>
        </div>
        <script src="scripts/popup.js"></script>
    </body>
</html>
